name: rpk
on:
  push:
    branches: [dev]
    paths:
      - 'src/go/rpk/**'
      - 'proto/redpanda/core/admin/**'
      - 'proto/redpanda/core/common/**'
      - 'buf.gen.yaml'
      - 'tools/go-comment-pbgen/**'
      - 'src/v/pandaproxy/schema_registry/protobuf/**'
      - '.github/workflows/rpk-build.yml'
  pull_request:
    paths:
      - 'src/go/rpk/**'
      - 'proto/redpanda/core/admin/**'
      - 'proto/redpanda/core/common/**'
      - 'buf.gen.yaml'
      - 'tools/go-comment-pbgen/**'
      - 'src/v/pandaproxy/schema_registry/protobuf/**'
      - '.github/workflows/rpk-build.yml'
  merge_group:
    types: [checks_requested]
jobs:
  build:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: 'src/go/rpk/go.sum'
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o rpk cmd/rpk/main.go
        working-directory: src/go/rpk/
  test:
    strategy:
      matrix:
        runner: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: 'src/go/rpk/go.sum'
      - run: go run gotest.tools/gotestsum@v1.12.3 -- -cover ./...
        working-directory: src/go/rpk/
  check-proto-gen:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Generate proto files
        run: buf generate
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code src/go/rpk/gen/; then
            git diff src/go/rpk/gen/
            echo "Error: Generated proto files are out of date"
            echo "Run 'buf generate' and commit the changes"
            exit 1
          fi
