# This client currently isn't published by the polaris project, so we
# can publish a fork of the client using github actions.
#
# The published package is available at https://pypi.org/project/redpanda-polaris-catalog-python/

name: Apache Polaris Python Client
on:
  workflow_dispatch:
jobs:
  publish:
    environment: pypi-apache-polaris-python-client
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Polaris project
        uses: actions/checkout@v4
        with:
          repository: 'apache/polaris'
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Generate client
        working-directory: ./client/python
        run: make regenerate-client
      - name: Update pyproject
        working-directory: ./client/python
        run: |
          sed -i \
            -e 's/name = "polaris"/name = "redpanda-polaris-catalog-python"/' \
            -e 's/version = "1.0.0"/version = "1.0.0.post3"/' \
            -e 's/"polaris\/\*\*"/"polaris\/\*\*\/\*\.py"/' \
            -e 's/boto3==/boto3>=/' pyproject.toml
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build distribution packages
        working-directory: client/python
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/python/dist
