---
name: Python

on:
  push:
    branches: [dev]
    paths:
      - 'tests/**/*.py'
      - 'tools/type-checking/**'
      - 'tests/pyrightconfig.json'
      - 'tests/setup.py'
      - '.github/workflows/type-check-python.yaml'
    tags-ignore:
      - '**'
  pull_request:
    branches: [dev]
    paths:
      - 'tests/**/*.py'
      - 'tools/type-checking/**'
      - 'tests/pyrightconfig.json'
      - 'tests/setup.py'
      - '.github/workflows/type-check-python.yaml'

jobs:
  type-check:
    name: type checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: "tests"
          file: tools/type-checking/Dockerfile
          tags: redpanda-data/python-type-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          load: true
      - name: Run type checking
        run: TC_SKIP_DOCKER_BUILD=1 tools/type-checking/type-check.sh ci --color=always
